# ================================================================
# NOM DU WORKFLOW
# ================================================================
name: Spring Boot CI + Docker + Deploy to EC2

# ================================================================
# DÉCLENCHEURS (Triggers)
# ================================================================
on:
  push:
    branches:
      - main                    # Le workflow se déclenche uniquement quand on pousse du code sur la branche "main"
        # Pourquoi ? Parce que "main" est considérée comme la branche de production.
      # On ne veut pas déployer automatiquement sur les autres branches (develop, feature, etc.)

# ================================================================
# JOBS : Chaque job s'exécute sur une machine virtuelle distincte
# ================================================================
jobs:

  # =================================================================
  # JOB 1 : TESTS
  # Objectif : Vérifier que le code fonctionne avant de continuer
  # =================================================================
  test:
    name: Exécuter les tests unitaires et d'intégration
    runs-on: ubuntu-latest                    # Machine virtuelle Ubuntu fournie gratuitement par GitHub

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        # Cette action clone tout le dépôt Git dans la machine virtuelle GitHub Actions

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'                  # Version de Java utilisée par notre projet Spring Boot
          distribution: 'temurin'             # Distribution open-source et fiable (Eclipse Temurin)
          cache: maven                        # Mise en cache des dépendances Maven → gain de temps considérable sur les builds suivants

      - name: Exécuter les tests
        run: mvn clean verify --batch-mode --no-transfer-progress --errors
        # clean     : Supprime les anciens fichiers compilés (dossier target)
        # verify    : Compile le projet + exécute les tests unitaires + tests d'intégration
        # --batch-mode : Rend les logs plus lisibles en environnement CI/CD
        # --no-transfer-progress : Cache les barres de progression de téléchargement
        # --errors  : Affiche les erreurs détaillées en cas d'échec (très utile pour le debug)


  # =================================================================
  # JOB 2 : BUILD & PUSH DOCKER
  # Objectif : Compiler l'application et créer/pousser l'image Docker
  # =================================================================
  build-and-push:
    name: Build JAR + Construire et pousser l'image Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      # ==================== PARTIE DOCKER ====================

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx est l'outil moderne de Docker pour construire les images plus rapidement et avec un meilleur cache

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true
        # On se connecte à Docker Hub avant de pousser l'image

      - name: Construire et pousser l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .                                      # Le dossier racine du projet (contient le Dockerfile)
          push: true                                      # true = on pousse l'image sur Docker Hub après l'avoir construite
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}
          # Explication des tags :
          # - "latest"     : Tag classique, facile à utiliser lors du déploiement
          # - "${{ github.sha }}" : Tag avec l'identifiant du commit (SHA)
          #   → Permet d'avoir une version unique et de faire du rollback facilement si besoin


  # =================================================================
  # JOB 3 : DÉPLOIEMENT SUR SERVEUR AWS EC2
  # =================================================================
  deploy:
    name: Déploiement sur serveur EC2 via SSH
    needs: build-and-push                     # Ce job ne s'exécute que si le build + push Docker a réussi
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déployer l'application sur EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3      # Action très utilisée pour exécuter des commandes à distance via SSH

        with:
          host: ${{ secrets.EC2_HOST }}                    # IP publique de ton instance EC2 (stockée dans les secrets)
          username: ${{ secrets.EC2_USERNAME }}            # Nom de l'utilisateur SSH (généralement "ubuntu" pour les AMI Ubuntu)
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}          # Clé SSH privée complète (contenu du fichier .pem)
          port: 22                                         # Port standard SSH

          script: |                                        # Script Bash qui sera exécuté sur le serveur distant
            echo "=== Déploiement démarré sur $(hostname) ==="

            # Nettoyage de l'ancien conteneur (s'il existe déjà)
            docker stop spring-app || true
            docker rm spring-app || true
            # "|| true" permet de continuer même si le conteneur n'existe pas (évite les erreurs)

            # On stocke le nom complet de l'image dans une variable pour plus de lisibilité et éviter les erreurs
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest"

            echo "Pulling image: $IMAGE_NAME"
            docker pull $IMAGE_NAME                       # Télécharge la dernière version de l'image depuis Docker Hub

            echo "Lancement du nouveau conteneur..."
            docker run -d \                               # -d = mode détaché (en arrière-plan)
              --name spring-app \                         # Nom du conteneur
              --restart unless-stopped \                  # Redémarre automatiquement le conteneur si le serveur redémarre
              -p 8080:8080 \                              # Mappe le port 8080 de l'hôte vers le port 8080 du conteneur
              $IMAGE_NAME

            echo "Déploiement terminé avec succès !"
            echo "Application disponible sur : http://$(curl -s ifconfig.me):8080"
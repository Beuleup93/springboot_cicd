name: Spring Boot CI + Docker + Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean verify --batch-mode --no-transfer-progress --errors

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}

  deploy:
    name: Déploiement sur EC2 via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déployer via SSH sur EC2
        uses: appleboy/ssh-action@v1.0.3   # version stable en 2026
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Déploiement démarré sur $(hostname)"
            docker --version || echo "Docker non installé !"

            # Arrête et supprime l'ancien conteneur s'il existe
            docker stop spring-app || true
            docker rm spring-app || true

            # Pull la dernière image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

            # Lance le conteneur
            docker run -d \
              --name spring-app \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest

            echo "Conteneur lancé → vérifie http://$(curl -s ifconfig.me):8080"
# ================================================================
# NOM DU WORKFLOW
# Un seul workflow clair qui fait tout : tests + build + push Docker
# ================================================================
name: Spring Boot CI test + Docker Build & Push

# ================================================================
# DÉCLENCHEURS
# ================================================================
on:
  push:
    branches:
      - main       # → tests + build JAR + build & push Docker
      - develop    # → seulement tests + build JAR (pas de push)
  pull_request:
    branches:
      - main
      - develop    # → tests + build JAR (vérification avant merge)

# ================================================================
# UN SEUL JOB = TOUT sur la même VM
# ================================================================
jobs:
  build-and-deploy:
    name: Tests + Build JAR + Docker Push (sur main)
    runs-on: ubuntu-latest

    # ────────────────────────────────────────────────
    # Étapes communes (exécutées à chaque fois)
    # ────────────────────────────────────────────────
    steps:

      # 1. Récupérer le code une seule fois
      - name: Récupérer le code source
        uses: actions/checkout@v4

      # 2. Installer Java + mettre en cache Maven (une seule fois pour tout le job)
      - name: Installer Java 17 + cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ────────────────────────────────────────────────
      # PARTIE TESTS – toujours exécutée (push + PR)
      # ────────────────────────────────────────────────
      - name: Exécuter les tests unitaires & d'intégration
        run: |
          mvn clean verify \
            --batch-mode \
            --no-transfer-progress \
            --errors

      # ────────────────────────────────────────────────
      # PARTIE BUILD JAR – toujours exécutée (push + PR)
      # On skippe les tests car déjà lancés juste avant
      # ────────────────────────────────────────────────
      - name: Compiler et packager le JAR
        run: |
          mvn clean package \
            -DskipTests \
            --batch-mode \
            --no-transfer-progress

      # ────────────────────────────────────────────────
      # PARTIE DOCKER : on configure les outils Docker
      # (seulement si on va build/push après)
      # ────────────────────────────────────────────────
      - name: Configurer Docker Buildx
        if: github.ref == 'refs/heads/main'   # optimisation : inutile sur develop/PR
        uses: docker/setup-buildx-action@v3

      # ────────────────────────────────────────────────
      # LOGIN DOCKER HUB – UNIQUEMENT sur main
      # ────────────────────────────────────────────────
      - name: Se connecter à Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ────────────────────────────────────────────────
      # BUILD & PUSH DE L'IMAGE – UNIQUEMENT sur main
      # ────────────────────────────────────────────────
      - name: Construire et pousser l'image Docker sur Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app:${{ github.sha }}
          # Optionnel : ajouter des labels pour plus d'infos
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}